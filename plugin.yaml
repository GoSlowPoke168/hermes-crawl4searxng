name: hermes-crawl4searxng
version: 1.0.0
description: "Crawl4AI web-extract backend for Hermes — pairs with the built-in SearXNG search provider for a complete, self-hosted web_search + web_extract stack."
author: Jeremy Hou
kind: backend
provides_web_providers:
  - crawl4ai
requires_env:
  - name: CRAWL4AI_URL
    description: "Base URL of your Crawl4AI instance"
    url: https://github.com/unclecode/crawl4ai
  - name: CRAWL4AI_API_TOKEN
    description: "Bearer token your Crawl4AI instance requires"
    secret: true
